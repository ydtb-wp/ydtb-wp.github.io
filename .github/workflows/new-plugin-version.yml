      - name: debug inputs
        run: |
          echo "vendor: $VENDOR"
          echo "slug: $SLUG"
          echo "version: $VERSION"
          echo "url: $URL"
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          VERSION: ${{ github.event.inputs.version }}
          URL: ${{ github.event.inputs.url }}

      # Twofold: First we need to get the token into the future steps
      # and additionally we need to clone this repo into the baseRepo folder.
      - name: Add Token To Future Git Steps
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ORG_ADMIN_TOKEN }} # `ORG_ADMIN_TOKEN` is a secret that contains your PAT
          path: baseRepo

      - name: Check if remote plugin repo exists
        id: check-remote
        run: |
          cd baseRepo && 
          [ "$(git ls-remote https://github.com/$HOST/$SLUG.git 2> /dev/null)" ] && { echo "EXISTS=true" >> "$GITHUB_OUTPUT"; } || { echo "EXISTS=false" >> "$GITHUB_OUTPUT"; }
        env:
          HOST: ${{ github.repository_owner }}
          SLUG: ${{ github.event.inputs.slug }}

      - name: debug exists
        run: |
          echo "exists: ${{steps.check-remote.outputs.EXISTS}}"

