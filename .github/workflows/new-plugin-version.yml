# This is a basic workflow to help you get started with Actions
name: New Plugin Version

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vendor:
        description: "Name of the plugin to fetch"
        required: true
      slug:
        description: "Slug of the plugin to fetch"
        required: true
      url:
        description: "URL of the plugin to fetch"
        required: true
      version:
        description: "Version of the plugin being updated"
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a set of jobs
  retrieve-inputs:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    outputs:
      valid-update: ${{ steps.valid-update.outputs.valid-update }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: echo inputs
        run: |
          echo "Vendor: $VENDOR"
          echo "Slug: $SLUG"
          echo "URL: $URL"
          echo "Version: $VER"
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          URL: ${{ github.event.inputs.url }}
          VER: ${{ github.event.inputs.version }}

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "repo"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      # - name: Get Info about the File Directory
      #   run: |
      #     cd repo && bun install
      #     echo "----- Current Directory -----"
      #     pwd
      #     echo "----- List Files -----"
      #     ls -la
      #     echo " "
      # - name: print pwd again
      #   run: |
      #     echo "----- Current Directory again -----"
      #     pwd
      #     echo " "
      - name: Run Bun To Confirm Plugin Version
        id: valid-update
        run: bun run ./repo/src/index.ts --vendor $VENDOR --slug $SLUG --pg_version $VER
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          VER: ${{ github.event.inputs.version }}

  fetch-plugin:
    runs-on: ubuntu-latest
    needs: retrieve-inputs
    steps:
      - name: Fetch plugin
        run: |
          echo "Fetching plugin $NAME from $HOME"
          # curl -L $URL -o $NAME.zip
        env:
          NAME: ${{ needs.retrieve-inputs.outputs.NAME }}
          HOME: ${{ needs.retrieve-inputs.outputs.HOME }}
          # URL: ${{ needs.retrieve-inputs.outputs.url }}
