# This is a basic workflow to help you get started with Actions
name: New Plugin Version

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vendor:
        description: "Name of the plugin to fetch"
        required: true
      slug:
        description: "Slug of the plugin to fetch"
        required: true
      url:
        description: "URL of the plugin to fetch"
        required: true
      version:
        description: "Version of the plugin being updated"
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a set of jobs
  retrieve-inputs:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    outputs:
      valid-update: ${{ steps.valid-update.outputs.valid-update }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Run Bun To Confirm Plugin Version
        id: valid-update
        run: |
          bun install
          bun run ./src/check-plugin-version.ts --vendor $VENDOR --slug $SLUG --update_version $VERSION
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          VERSION: ${{ github.event.inputs.version }}

  fetch-plugin:
    runs-on: ubuntu-latest
    needs: retrieve-inputs
    steps:
      - name: Fetch plugin
        run: |
          echo "Fetching plugin $VENDOR/$SLUG from $HOME"
          mkdir -p Download && cd Download
          curl -O $URL
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          VERSION: ${{ github.event.inputs.version }}
          URL: ${{ github.event.inputs.url }}

      - name: list files
        run: |
          echo "------ Listing files in Root ------"
          ls -la

          echo "------ Listing files in Download ------"
          cd Download && ls -la
