# This is a basic workflow to help you get started with Actions
name: New Plugin Version

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      vendor:
        description: "Name of the plugin to fetch"
        required: true
      slug:
        description: "Slug of the plugin to fetch"
        required: true
      url:
        description: "URL of the plugin to fetch"
        required: true
      version:
        description: "Version of the plugin being updated"
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  validate-plugin-should-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Run Bun To Confirm Plugin Version
        id: valid-update
        run: |
          bun install
          bun run ./src/check-plugin-version.ts --vendor $VENDOR --slug $SLUG --update_version $VERSION
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
          SLUG: ${{ github.event.inputs.slug }}
          VERSION: ${{ github.event.inputs.version }}

  handle-plugin-update:
    runs-on: ubuntu-latest
    needs: validate-plugin-should-update
    steps:
      - name: setup folders
        run: |
          mkdir -p plugin
          mkdir -p git
          mkdir -p repo

      - name: Check if remote repo exists
        id: check-remote
        run: |
          if ! git ls-remote --exit-code https://github.com/$HOST/$SLUG > /dev/null 2>&1; then 
            echo "exists='false'" >> $GITHUB_OUTPUT
          else
            echo "exists='true'" >> $GITHUB_OUTPUT
          fi
        env:
          HOST: ydtb-wp
          SLUG: ${{ github.event.inputs.slug }}

      - name: Create Repo if it doesn't exist
        if: steps.check-remote.outputs.exists == 'false'
        run: |
          echo "Creating repo"

