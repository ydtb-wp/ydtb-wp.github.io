name: Report Plugin Update List
on:
  workflow_dispatch:
    inputs:
      json:
        description: "List of plugins to update in JSON format"
        required: true
jobs:
  update-plugin:
    strategy:
      max-parallel: 1
      matrix:
        value: ${{fromJSON(github.event.inputs.json)}}
      fail-fast: false
    uses: ./.github/workflows/new-plugin-version.yml
    with:
      slug: "${{ matrix.value.plugin_slug }}"
      url: "${{ matrix.value.plugin_update_url }}"
      version: "${{ matrix.value.plugin_update_version }}"
      vendor: "${{ matrix.value.plugin_vendor }}"
    secrets: inherit
